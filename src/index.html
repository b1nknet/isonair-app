<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>isonair?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <div id="title-group">
        <span id="app-title">isonair?</span>
        <button id="chzzk-btn" title="치지직 홈 열기" aria-label="치지직">
          <svg viewBox="0 0 32 32" width="14" height="14" aria-hidden="true" fill="currentColor"><path d="M24.106 24.664v-4.782H16.92l7.911-10.915h-6.41l1.94-2.678h-6.41L8.653 13.6h6.41l-8.02 11.065h17.063Z"/></svg>
        </button>
        <button id="github-btn" title="GitHub 저장소 열기" aria-label="GitHub">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </button>
      </div>
      <div id="titlebar-btns">
        <button id="view-btn" title="목록 / 그리드 보기 전환">▦</button>
        <button id="refresh-btn" title="새로고침 (다음 자동 새로고침까지 남은 시간)"><span class="refresh-icon">↺</span><span id="countdown">30s</span></button>
        <button id="add-btn" title="채널 추가">+</button>
        <button id="more-btn" title="더보기">⋯</button>
        <button id="minimize-btn">−</button>
        <button id="close-btn">×</button>
      </div>
    </div>

    <div id="error-banner" class="hidden"></div>

    <div id="add-bar" class="hidden">
      <div id="add-bar-row">
        <input id="channel-input" type="text" placeholder="채널 ID 또는 chzzk.naver.com URL" />
        <button id="add-confirm-btn">추가</button>
        <button id="add-cancel-btn" title="닫기">×</button>
      </div>
    </div>

    <div id="more-menu" class="hidden">
      <div class="menu-item" id="menu-always-on-top">
        <span class="menu-check">✓</span><span>항상 위에 고정</span>
      </div>
      <div class="menu-item" id="menu-hide-offline">
        <span class="menu-check">✓</span><span>오프라인 채널 숨기기</span>
      </div>
      <div class="menu-divider"></div>
      <div class="menu-item" id="menu-export">채널 내보내기 (JSON)</div>
      <div class="menu-item" id="menu-import">채널 가져오기 (JSON)</div>
      <div class="menu-divider"></div>
      <div class="menu-item" id="menu-update">업데이트 확인</div>
      <div class="menu-divider"></div>
      <div class="menu-version">
        <span>현재 버전</span>
        <span id="current-version">—</span>
      </div>
    </div>

    <div id="update-banner" class="hidden">
      <span id="update-text"></span>
      <button id="update-restart" class="hidden">재시작</button>
    </div>

    <div id="channel-list"></div>

    <div id="footer">
      <span id="opacity-label">투명도</span>
      <input id="opacity-slider" type="range" min="20" max="100" value="100" />
      <span id="opacity-value">100%</span>
      <div id="scale-control">
        <button id="scale-minus" title="인터페이스 축소">−</button>
        <span id="scale-value">100%</span>
        <button id="scale-plus" title="인터페이스 확대">+</button>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
